        <path d="M144 28 L8 124 L8 260 L280 260 L280 124 Z" fill="none"/>
        <!-- Door -->
        <rect x="104" y="164" width="80" height="96" rx="6" fill="#2196F3" stroke="#2196F3"/>
        <!-- Window left -->
        <rect x="28" y="152" width="52" height="44" rx="5" fill="none" stroke="#FFB74D"/>
        <!-- Window right -->
        <rect x="208" y="152" width="52" height="44" rx="5" fill="none" stroke="#FFB74D"/>
        <!-- Chimney -->
