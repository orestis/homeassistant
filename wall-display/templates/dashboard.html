<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Wall Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow-y: auto;
      background: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;

      /* Type scale — major third (~1.25×) */
      --text-xs:  0.70rem;   /* 11.2px — fine print */
      --text-sm:  0.85rem;   /* 13.6px — secondary */
      --text-md:  1.00rem;   /* 16.0px — body */
      --text-lg:  1.25rem;   /* 20.0px — emphasis */
      --text-xl:  1.50rem;   /* 24.0px — heading */
      --text-2xl: 1.75rem;   /* 28.0px — display */
    }

    #dashboard {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 8px;
      gap: 8px;
    }

    /* --- Status Bar --- */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e1e1e;
      border-radius: 14px;
      padding: 13px 22px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .status-left {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
    }
    .status-left-temps {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .status-left-main {
      display: flex;
      align-items: center;
    }
    .status-left-secondary {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .indoor-temp {
      font-size: var(--text-md);
      font-weight: 700;
      line-height: 1.15;
    }
    .indoor-humidity {
      font-size: var(--text-md);
      color: #888;
    }
    .icon-outdoor {
      width: 21px;
      height: 21px;
      color: #666;
      flex-shrink: 0;
    }

    /* --- Fan indicators --- */
    .fan-indicators {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .fan-indicator {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: #333;
      transition: color 0.3s;
    }
    .fan-indicator.auto {
      color: var(--fan-color);
      animation: fan-pulse 1.5s ease-in-out infinite;
    }
    .fan-indicator.manual {
      color: var(--fan-color);
    }
    @keyframes fan-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes loading-pulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.6; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* Shared spinner: hide children, show rotating ring (buttons only) */
    button.htmx-request > * {
      visibility: hidden;
    }
    button.htmx-request {
      position: relative;
      pointer-events: none;
    }
    button.htmx-request::after {
      content: '';
      position: absolute;
      inset: 0;
      margin: auto;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .outdoor-temp {
      font-size: var(--text-md);
      color: #666;
    }
    .status-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.1;
    }
    .status-time {
      font-size: var(--text-xl);
      font-weight: 700;
    }
    .status-date {
      font-size: var(--text-md);
      color: #888;
    }
    .status-right {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .forecast-icon {
      font-size: var(--text-2xl);
    }
    .forecast-range {
      font-size: var(--text-md);
      color: #aaa;
      font-weight: 600;
    }

    /* --- Scenes --- */
    .scenes-section {
      flex: 1;
      display: flex;
      align-items: center;
    }
    .scene-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
    }
    .scene-grid form { display: contents; }

    /* --- Tiles --- */
    .tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }
    .tile:active {
      opacity: 0.7;
      transform: scale(0.95);
    }
    .tile.htmx-request {
      opacity: 0.6;
    }

    .scene-tile {
      padding: 16px 6px;
      min-height: 80px;
    }
    .scene-tile.active {
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.5);
    }
    .tile-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      margin-bottom: 6px;
    }
    .tile-icon svg {
      width: 100%;
      height: 100%;
    }
    .tile-label { font-size: var(--text-sm); font-weight: 600; }

    /* --- Water Heater Row --- */
    .water-heater-row {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .tariff-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 6px 10px;
      border-radius: 12px;
      background: #1a1a1a;
      color: #555;
      font-size: var(--text-xs);
      min-width: 52px;
      font-variant-numeric: tabular-nums;
    }
    .tariff-badge.active {
      background: #1b3a1b;
      color: #66bb6a;
    }
    .tariff-icons {
      display: flex;
      align-items: center;
      gap: 1px;
    }
    .tariff-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .tariff-euro {
      font-size: var(--text-xs);
      font-weight: 700;
    }
    .tariff-label {
      font-weight: 600;
      font-size: var(--text-xs);
    }
    .tariff-detail {
      font-size: var(--text-xs);
    }
    .wh-main-form {
      flex: 1;
    }
    .wh-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: var(--text-md);
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }
    .wh-btn:active {
      opacity: 0.7;
      transform: scale(0.97);
    }
    .wh-btn.htmx-request {
      opacity: 0.6;
    }
    .wh-btn.off {
      background: #2a2a2a;
      color: #888;
    }
    .wh-btn.on {
      background: #1565c0;
      color: #fff;
    }
    .wh-icon {
      font-size: var(--text-lg);
    }
    .wh-label {
      flex: 1;
    }
    .wh-timer-info {
      font-size: var(--text-sm);
      opacity: 0.8;
      font-variant-numeric: tabular-nums;
    }
    .wh-bypass-form {
      display: flex;
    }
    .wh-bypass-btn {
      width: 48px;
      border: none;
      border-radius: 12px;
      background: #2a2a2a;
      color: #666;
      font-size: var(--text-lg);
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }
    .wh-bypass-btn.active {
      background: #e65100;
      color: #fff;
    }
    .wh-bypass-btn:active {
      opacity: 0.7;
      transform: scale(0.92);
    }
    .wh-bypass-btn.htmx-request {
      opacity: 0.6;
    }

    /* --- Climate Bottom --- */
    .climate-bottom {
      flex-shrink: 0;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 8px 10px;
    }
    .climate-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: var(--text-sm);
      color: #888;
    }
    .climate-status {
      text-transform: capitalize;
    }
    .climate-status.heating {
      color: #ff8a65;
    }
    .climate-water {
      margin-left: auto;
    }
    .climate-consumption {
      display: flex;
      align-items: center;
      gap: 3px;
      color: #aaa;
    }
    .icon-consumption {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .solar-correction {
      color: #ffb74d;
    }
    .climate-buttons {
      display: flex;
      gap: 3px;
    }
    .climate-buttons form {
      flex: 1;
      display: flex;
    }
    .climate-val-btn {
      width: 100%;
      padding: 10px 0;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      font-size: var(--text-xs);
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
      opacity: 0.6;
    }
    .climate-val-btn.active {
      opacity: 1;
      outline: 2px solid #fff;
      outline-offset: -2px;
      transform: scale(1.05);
    }
    .climate-val-btn:active {
      transform: scale(0.92);
    }
    .climate-val-btn.htmx-request {
      opacity: 0.6;
    }
  </style>
</head>
<body>
  {% include "partials/dashboard_content.html" %}
  <script src="{{ base_path }}/static/htmx.min.js" defer></script>
  <script>
    // Send app version on every htmx request so the server can
    // force a full page reload when a new version is deployed.
    document.addEventListener('htmx:configRequest', function(e) {
      e.detail.headers['X-App-Version'] = '{{ app_version }}';
    });
  </script>
</body>
</html>
