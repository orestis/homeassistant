<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Wall Display</title>
  <link rel="manifest" href="{{ base_path }}/manifest.json">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Wall Display">
  <link rel="apple-touch-icon" href="{{ base_path }}/static/icon-192.svg">
  <link rel="icon" href="{{ base_path }}/static/icon-192.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow-y: auto;
      background: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;

      /* Type scale — major third (~1.25×) */
      --text-xs:  0.70rem;   /* 11.2px — fine print */
      --text-sm:  0.85rem;   /* 13.6px — secondary */
      --text-md:  1.00rem;   /* 16.0px — body */
      --text-lg:  1.25rem;   /* 20.0px — emphasis */
      --text-xl:  1.50rem;   /* 24.0px — heading */
      --text-2xl: 1.75rem;   /* 28.0px — display */
    }

    #dashboard {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 8px;
      gap: 8px;
    }

    /* --- Status Bar --- */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e1e1e;
      border-radius: 14px;
      padding: 13px 22px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .status-left {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
    }
    .status-left-temps {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .status-left-main {
      display: flex;
      align-items: center;
    }
    .status-left-secondary {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .indoor-temp {
      font-size: var(--text-md);
      font-weight: 700;
      line-height: 1.15;
    }
    .indoor-humidity {
      font-size: var(--text-md);
      color: #888;
    }
    .icon-outdoor {
      width: 21px;
      height: 21px;
      color: #666;
      flex-shrink: 0;
    }

    /* --- Fan indicators --- */
    .fan-indicators {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .fan-indicator {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: #333;
      transition: color 0.3s;
    }
    .fan-indicator.auto {
      color: var(--fan-color);
      animation: fan-pulse 1.5s ease-in-out infinite;
    }
    .fan-indicator.manual {
      color: var(--fan-color);
    }
    @keyframes fan-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes loading-pulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.6; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* Shared spinner: hide children, show rotating ring (buttons only) */
    button.htmx-request > * {
      visibility: hidden;
    }
    button.htmx-request {
      position: relative;
      pointer-events: none;
    }
    button.htmx-request::after {
      content: '';
      position: absolute;
      inset: 0;
      margin: auto;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .outdoor-temp {
      font-size: var(--text-md);
      color: #666;
    }
    .status-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.1;
    }
    .status-time {
      font-size: var(--text-xl);
      font-weight: 700;
    }
    .time-colon {
      transition: opacity 0.3s;
    }
    .htmx-request .time-colon,
    .loading .time-colon {
      animation: colon-pulse 1.2s ease-in-out infinite;
    }
    @keyframes colon-pulse {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.5; }
    }
    .status-date {
      font-size: var(--text-md);
      color: #888;
    }
    .status-right {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .forecast-icon {
      font-size: var(--text-2xl);
    }
    .forecast-range {
      font-size: var(--text-md);
      color: #aaa;
      font-weight: 600;
    }

    /* --- Scenes --- */
    .scenes-section {
      flex: 1;
      display: flex;
      align-items: center;
    }
    .scene-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
    }
    .scene-grid form { display: contents; }

    /* --- Tiles --- */
    .tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }
    .tile:active {
      opacity: 0.7;
      transform: scale(0.95);
    }
    .tile.htmx-request {
      opacity: 0.6;
    }

    .scene-tile {
      padding: 16px 6px;
      min-height: 80px;
    }
    .scene-tile.active {
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.5);
    }
    .tile-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      margin-bottom: 6px;
    }
    .tile-icon svg {
      width: 100%;
      height: 100%;
    }
    .tile-label { font-size: var(--text-sm); font-weight: 600; }

    /* --- Water Heater Row --- */
    .water-heater-row {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .tariff-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 6px 10px;
      border-radius: 12px;
      background: #1a1a1a;
      color: #555;
      font-size: var(--text-xs);
      min-width: 52px;
      font-variant-numeric: tabular-nums;
    }
    .tariff-badge.active {
      background: #1b3a1b;
      color: #66bb6a;
    }
    .tariff-icons {
      display: flex;
      align-items: center;
      gap: 1px;
    }
    .tariff-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .tariff-euro {
      font-size: var(--text-xs);
      font-weight: 700;
    }
    .tariff-label {
      font-weight: 600;
      font-size: var(--text-xs);
    }
    .tariff-detail {
      font-size: var(--text-xs);
    }
    .wh-main-form {
      flex: 1;
    }
    .wh-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: var(--text-md);
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }
    .wh-btn:active {
      opacity: 0.7;
      transform: scale(0.97);
    }
    .wh-btn.htmx-request {
      opacity: 0.6;
    }
    .wh-btn.off {
      background: #2a2a2a;
      color: #888;
    }
    .wh-btn.on {
      background: #1565c0;
      color: #fff;
    }
    .wh-icon {
      font-size: var(--text-lg);
    }
    .wh-label {
      flex: 1;
    }
    .wh-timer-info {
      font-size: var(--text-sm);
      opacity: 0.8;
      font-variant-numeric: tabular-nums;
    }
    .wh-bypass-form {
      display: flex;
    }
    .wh-bypass-btn {
      width: 48px;
      border: none;
      border-radius: 12px;
      background: #2a2a2a;
      color: #666;
      font-size: var(--text-lg);
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }
    .wh-bypass-btn.active {
      background: #e65100;
      color: #fff;
    }
    .wh-bypass-btn:active {
      opacity: 0.7;
      transform: scale(0.92);
    }
    .wh-bypass-btn.htmx-request {
      opacity: 0.6;
    }

    /* --- Climate Bottom --- */
    .climate-bottom {
      flex-shrink: 0;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 8px 10px;
    }
    .climate-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: var(--text-sm);
      color: #888;
    }
    .climate-status {
      text-transform: capitalize;
    }
    .climate-status.heating {
      color: #ff8a65;
    }
    .climate-water {
      margin-left: auto;
    }
    .climate-consumption {
      display: flex;
      align-items: center;
      gap: 3px;
      color: #aaa;
    }
    .icon-consumption {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .solar-correction {
      color: #ffb74d;
    }
    .climate-buttons {
      display: flex;
      gap: 3px;
    }
    .climate-buttons form {
      flex: 1;
      display: flex;
    }
    .climate-val-btn {
      width: 100%;
      padding: 10px 0;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      font-size: var(--text-xs);
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
      opacity: 0.6;
    }
    .climate-val-btn.active {
      opacity: 1;
      outline: 2px solid #fff;
      outline-offset: -2px;
      transform: scale(1.05);
    }
    .climate-val-btn:active {
      transform: scale(0.92);
    }
    .climate-val-btn.htmx-request {
      opacity: 0.6;
    }

    /* --- Notify Button + Spacer Row --- */
    .notify-spacer-row {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .notify-cell {
      flex: 1;
      position: relative;
      min-height: 58px;
    }
    .spacer-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 58px;
      border-radius: 14px;
      border: 2px solid #444;
      background: #1e1e1e;
      color: #aaa;
      font-size: var(--text-xl);
      letter-spacing: 2px;
      text-decoration: none;
      -webkit-user-select: none;
      user-select: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .spacer-btn:active {
      opacity: 0.7;
      transform: scale(0.97);
    }
    .spacer-icon {
      width: 26px;
      height: 26px;
    }
    .notify-btn {
      width: 100%;
      height: 100%;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 2px solid #c62828;
      border-radius: 14px;
      background: #1a1a1a;
      color: #c62828;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }
    .notify-btn:active {
      opacity: 0.7;
      transform: scale(0.97);
    }
    .notify-btn.cooldown {
      border-color: #333;
      background: #1a1a1a;
      color: #444;
      cursor: default;
    }
    .notify-btn.cooldown:active {
      opacity: 1;
      transform: none;
    }
    .notify-btn.person-home {
      border-color: #333;
      background: #1a1a1a;
      color: #444;
      cursor: default;
    }
    .notify-btn.person-home:active {
      opacity: 1;
      transform: none;
    }
    .notify-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }
    .notify-cooldown-text {
      font-size: var(--text-sm);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* Confirmation form — replaces button in-place */
    .notify-confirm-form {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      animation: notify-confirm-in 0.3s ease-out;
      z-index: 10;
    }
    @keyframes notify-confirm-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .notify-confirm-btn {
      width: 100%;
      height: 100%;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      background: #c62828;
      color: #fff;
      cursor: default;
      -webkit-user-select: none;
      user-select: none;
      transition: border-color 0.3s;
    }
    .notify-confirm-btn:not(:disabled) {
      border-color: #fff;
      cursor: pointer;
    }
    .notify-confirm-btn:not(:disabled):active {
      opacity: 0.7;
      transform: scale(0.97);
    }
    .notify-confirm-btn.htmx-request {
      opacity: 0.6;
    }
    .notify-cancel-x {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: rgba(0,0,0,0.4);
      color: rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      z-index: 11;
    }
    .notify-cancel-x:active {
      opacity: 0.7;
    }
    .notify-cancel-x svg {
      width: 16px;
      height: 16px;
    }
    .notify-countdown-ring {
      position: relative;
      width: 40px;
      height: 40px;
    }
    .notify-countdown-ring svg {
      width: 100%;
      height: 100%;
    }
    .notify-countdown-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-md);
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  {% include "partials/dashboard_content.html" %}
  <script src="{{ base_path }}/static/htmx.min.js" defer></script>
  <script>
    // Send app version on every htmx request so the server can
    // force a full page reload when a new version is deployed.
    document.addEventListener('htmx:configRequest', function(e) {
      e.detail.headers['X-App-Version'] = '{{ app_version }}';
    });

    // Catch-all click: tap anywhere non-interactive to refresh state
    document.addEventListener('click', function(e) {
      if (e.target.closest('button, a, input, select, textarea, form')) return;
      var dash = document.getElementById('dashboard');
      if (dash) htmx.trigger(dash, 'manualRefresh');
    });

    // Register service worker for PWA support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('{{ base_path }}/sw.js')
        .then(function(reg) { console.log('SW registered:', reg.scope); })
        .catch(function(err) { console.warn('SW registration failed:', err); });
    }

    // --- Notify button confirmation logic ---
    var _notifyTimer = null;
    var _notifyCountdown = 3;

    function notifyConfirmShow() {
      var form = document.getElementById('notify-confirm-form');
      var trigger = document.getElementById('notify-trigger');
      if (!form || !trigger) return;
      if (trigger.disabled) return;
      trigger.style.display = 'none';
      form.style.display = '';
      _notifyCountdown = 3;
      var numEl = document.getElementById('notify-countdown-num');
      var arcEl = document.getElementById('notify-countdown-arc');
      var sendBtn = document.getElementById('notify-send-btn');
      if (numEl) numEl.textContent = _notifyCountdown;
      if (sendBtn) sendBtn.disabled = true;
      // Reset arc
      var circumference = 163.36;
      if (arcEl) {
        arcEl.style.transition = 'none';
        arcEl.setAttribute('stroke-dashoffset', circumference);
        arcEl.getBoundingClientRect();
        arcEl.style.transition = 'stroke-dashoffset 3s linear';
        arcEl.setAttribute('stroke-dashoffset', '0');
      }
      clearInterval(_notifyTimer);
      _notifyTimer = setInterval(function() {
        _notifyCountdown--;
        if (numEl) numEl.textContent = Math.max(0, _notifyCountdown);
        if (_notifyCountdown <= 0) {
          clearInterval(_notifyTimer);
          _notifyTimer = null;
          if (sendBtn) sendBtn.disabled = false;
          if (numEl) numEl.textContent = '✓';
        }
      }, 1000);
    }

    function notifyConfirmCancel() {
      clearInterval(_notifyTimer);
      _notifyTimer = null;
      var form = document.getElementById('notify-confirm-form');
      var trigger = document.getElementById('notify-trigger');
      if (form) form.style.display = 'none';
      if (trigger) trigger.style.display = '';
    }

    document.addEventListener('htmx:afterSwap', function(e) {
      if (_notifyTimer) {
        clearInterval(_notifyTimer);
        _notifyTimer = null;
      }
    });

    // Hidden 5-tap gesture on clock → audio debug page
    (function() {
      var taps = 0, timer = null;
      document.addEventListener('click', function(e) {
        if (!e.target.closest('.status-center')) return;
        e.stopPropagation();
        taps++;
        clearTimeout(timer);
        timer = setTimeout(function() { taps = 0; }, 2000);
        if (taps >= 5) {
          taps = 0;
          clearTimeout(timer);
          window.location.href = '{{ base_path }}/audio-debug';
        }
      }, true);
    })();
  </script>
</body>
</html>
