<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Wall Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
    }

    #dashboard {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 8px;
      gap: 8px;
    }

    /* --- Status Bar --- */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e1e1e;
      border-radius: 12px;
      padding: 8px 14px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .status-left {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .status-left-main {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-left-secondary {
      display: flex;
      align-items: center;
      gap: 5px;
      padding-left: 21px;
    }
    .icon-indoor {
      width: 16px;
      height: 16px;
      color: #e0e0e0;
      flex-shrink: 0;
    }
    .indoor-temp {
      font-size: 1.31rem;
      font-weight: 700;
      line-height: 1.15;
    }
    .indoor-humidity {
      font-size: 0.75rem;
      color: #666;
    }
    .icon-outdoor {
      width: 13px;
      height: 13px;
      color: #666;
      flex-shrink: 0;
    }
    .outdoor-temp {
      font-size: 0.8rem;
      color: #666;
    }
    .status-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.1;
    }
    .status-time {
      font-size: 1.1rem;
      font-weight: 700;
    }
    .status-date {
      font-size: 0.7rem;
      color: #888;
    }
    .status-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .forecast-icon {
      font-size: 1.2rem;
    }
    .forecast-range {
      font-size: 0.9rem;
      color: #aaa;
      font-weight: 600;
    }

    /* --- Scenes --- */
    .scenes-section {
      flex: 1;
      display: flex;
      align-items: center;
    }
    .scene-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
    }
    .scene-grid form { display: contents; }

    /* --- Tiles --- */
    .tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }
    .tile:active {
      opacity: 0.7;
      transform: scale(0.95);
    }
    .tile.htmx-request {
      opacity: 0.5;
    }

    .scene-tile {
      padding: 20px 8px;
      min-height: 90px;
    }
    .scene-tile.active {
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.5);
    }
    .tile-icon { font-size: 2rem; margin-bottom: 6px; }
    .tile-label { font-size: 0.9rem; font-weight: 600; }

    /* --- Climate Bottom --- */
    .climate-bottom {
      flex-shrink: 0;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 8px 10px;
    }
    .climate-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 0.8rem;
      color: #888;
    }
    .climate-status {
      text-transform: capitalize;
    }
    .climate-status.heating {
      color: #ff8a65;
    }
    .climate-water {
      margin-left: auto;
    }
    .climate-buttons {
      display: flex;
      gap: 3px;
    }
    .climate-buttons form {
      flex: 1;
      display: flex;
    }
    .climate-val-btn {
      width: 100%;
      padding: 10px 0;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
      opacity: 0.6;
    }
    .climate-val-btn.active {
      opacity: 1;
      outline: 2px solid #fff;
      outline-offset: -2px;
      transform: scale(1.05);
    }
    .climate-val-btn:active {
      transform: scale(0.92);
    }
    .climate-val-btn.htmx-request {
      opacity: 0.3;
    }
  </style>
</head>
<body>
  {% include "partials/dashboard_content.html" %}
  <script src="/static/htmx.min.js" defer></script>
</body>
</html>
