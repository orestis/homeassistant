<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Ρολά — Wall Display</title>
  <link rel="manifest" href="{{ base_path }}/manifest.json">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="{{ base_path }}/static/icon-192.svg">
  <link rel="icon" href="{{ base_path }}/static/icon-192.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow-y: auto;
      background: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;

      --text-xs:  0.70rem;
      --text-sm:  0.85rem;
      --text-md:  1.00rem;
      --text-lg:  1.25rem;
      --text-xl:  1.50rem;
      --text-2xl: 1.75rem;
    }

    #rollers-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 8px;
      gap: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* --- Header --- */
    .rollers-header {
      display: flex;
      align-items: center;
      padding: 10px 6px;
      flex-shrink: 0;
    }
    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #1e1e1e;
      color: #aaa;
      text-decoration: none;
      -webkit-user-select: none;
      user-select: none;
      transition: opacity 0.1s;
    }
    .back-btn:active {
      opacity: 0.6;
    }
    .back-btn svg {
      width: 22px;
      height: 22px;
    }
    .rollers-title {
      flex: 1;
      text-align: center;
      font-size: var(--text-lg);
      font-weight: 700;
      color: #ccc;
    }
    .header-spacer {
      width: 40px;
    }

    /* --- Roller Groups --- */
    .roller-groups {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: center;
    }
    .roller-group {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 14px 12px;
    }
    .roller-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .roller-group-name {
      font-size: var(--text-md);
      font-weight: 700;
      color: #ccc;
    }
    .roller-state-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 28px;
      color: #888;
    }
    .roller-state-icon svg {
      width: 100%;
      height: 100%;
    }
    .roller-state-diverged {
      opacity: 0.7;
    }

    /* --- Preset Buttons --- */
    .roller-presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .roller-presets form {
      display: contents;
    }
    .roller-preset-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 12px 4px;
      min-height: 68px;
      border: none;
      border-radius: 10px;
      background: #2a2a2a;
      color: #888;
      font-family: inherit;
      font-size: var(--text-xs);
      font-weight: 600;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      transition: opacity 0.1s, transform 0.1s;
    }
    .roller-preset-btn:active {
      opacity: 0.7;
      transform: scale(0.93);
    }
    .roller-preset-btn.active {
      background: #1565c0;
      color: #fff;
    }
    /* Pending = target button while motor is running */
    .roller-preset-btn.pending > * {
      visibility: hidden;
    }
    .roller-preset-btn.pending {
      position: relative;
      pointer-events: none;
      opacity: 0.7;
      background: #1565c0;
    }
    .roller-preset-btn.pending::after {
      content: '';
      position: absolute;
      inset: 0;
      margin: auto;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .preset-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 28px;
    }
    .preset-icon svg {
      width: 100%;
      height: 100%;
    }

    /* --- Auto-Return Bar --- */
    .auto-return-bar {
      flex-shrink: 0;
      height: 3px;
      background: #1e1e1e;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    .auto-return-progress {
      height: 100%;
      background: #444;
      border-radius: 2px;
      width: 100%;
      transform-origin: left;
      animation: auto-return-shrink 60s linear forwards;
    }
    @keyframes auto-return-shrink {
      from { transform: scaleX(1); }
      to { transform: scaleX(0); }
    }
  </style>
</head>
<body>
  {% include "partials/rollers_content.html" %}
  <script src="{{ base_path }}/static/htmx.min.js" defer></script>
  <script>
    var _basePath = '{{ base_path }}';
    var _appVersion = '{{ app_version }}';

    // Send app version on every htmx request
    document.addEventListener('htmx:configRequest', function(e) {
      e.detail.headers['X-App-Version'] = _appVersion;
    });

    // --- Pending targets: { groupName: positionString } ---
    var _pendingTargets = {};
    var _fastPollTimer = null;
    var _bgPollTimer = null;

    // --- Button click: plain fetch, no htmx ---
    function onPresetClick(btn) {
      resetAutoReturn();
      var group = btn.closest('.roller-group');
      var groupName = group.getAttribute('data-group');
      var entityIds = group.getAttribute('data-entities');
      var position = btn.getAttribute('data-position');

      // Same button pressed again while pending → stop
      if (_pendingTargets[groupName] === position) {
        delete _pendingTargets[groupName];
        btn.classList.remove('pending');
        sendCoverAction(entityIds, null, 'stop');
        startFastPoll();
        return;
      }

      // New command
      _pendingTargets[groupName] = position;
      group.querySelectorAll('.roller-preset-btn').forEach(function(b) {
        b.classList.remove('pending', 'active');
      });
      btn.classList.add('pending');
      sendCoverAction(entityIds, position, null);
      startFastPoll();
    }

    function sendCoverAction(entityIds, position, action) {
      var fd = new FormData();
      fd.append('entity_ids', entityIds);
      if (action) fd.append('action', action);
      if (position !== null) fd.append('position', position);
      fetch(_basePath + '/action/cover', { method: 'POST', body: fd });
    }

    // --- htmx beforeSwap: preserve pending groups ---
    document.addEventListener('htmx:beforeSwap', function(evt) {
      if (Object.keys(_pendingTargets).length === 0) return;

      // Parse incoming HTML
      var tmp = document.createElement('div');
      tmp.innerHTML = evt.detail.serverResponse;
      var newPage = tmp.querySelector('#rollers-page');
      if (!newPage) return;

      // For each pending group, check if still moving in new HTML
      Object.keys(_pendingTargets).forEach(function(groupName) {
        var newGroup = newPage.querySelector('.roller-group[data-group="' + groupName + '"]');
        var oldGroup = document.querySelector('.roller-group[data-group="' + groupName + '"]');
        if (!newGroup || !oldGroup) return;

        var stillMoving = newGroup.getAttribute('data-moving') === 'true';
        if (stillMoving) {
          // Replace new group with current DOM version (preserves spinner)
          newGroup.parentNode.replaceChild(oldGroup.cloneNode(true), newGroup);
        } else {
          // Motor stopped — let the new HTML through, clear pending
          delete _pendingTargets[groupName];
        }
      });

      // Write modified HTML back
      evt.detail.serverResponse = tmp.innerHTML;
    });

    // After swap: stop fast poll if nothing pending
    document.addEventListener('htmx:afterSettle', function() {
      if (Object.keys(_pendingTargets).length === 0) {
        // Check if any group is still moving (e.g. from external trigger)
        var anyMoving = false;
        document.querySelectorAll('.roller-group[data-moving="true"]').forEach(function() {
          anyMoving = true;
        });
        if (!anyMoving) stopFastPoll();
      }
    });

    // --- Polling: JS-driven intervals, htmx does the swap ---
    function triggerRefresh() {
      var page = document.getElementById('rollers-page');
      if (page) htmx.trigger(page, 'manualRefresh');
    }

    function startFastPoll() {
      if (_fastPollTimer) return;
      _fastPollTimer = setInterval(triggerRefresh, 750);
    }

    function stopFastPoll() {
      if (_fastPollTimer) {
        clearInterval(_fastPollTimer);
        _fastPollTimer = null;
      }
    }

    // Background poll every 30s
    _bgPollTimer = setInterval(triggerRefresh, 30000);

    // --- Auto-return timer (60s inactivity → back to home) ---
    var _autoReturnTimeout = null;
    var _autoReturnDuration = 60000;

    function startAutoReturn() {
      var bar = document.getElementById('auto-return-progress');
      if (bar) {
        bar.style.animation = 'none';
        bar.offsetHeight; // force reflow
        bar.style.animation = 'auto-return-shrink ' + (_autoReturnDuration / 1000) + 's linear forwards';
      }
      clearTimeout(_autoReturnTimeout);
      _autoReturnTimeout = setTimeout(function() {
        window.location.href = _basePath + '/';
      }, _autoReturnDuration);
    }

    function resetAutoReturn() {
      startAutoReturn();
    }

    function clearAutoReturn() {
      clearTimeout(_autoReturnTimeout);
    }

    // Start timer on page load
    startAutoReturn();

    // Reset on any touch/click
    document.addEventListener('click', function() {
      resetAutoReturn();
    });
  </script>
</body>
</html>
